<!--JSON-LD docs breadcrumbs -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
        {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "{{ site.url }}/"
        },
        {
            "@type": "ListItem",
            "position": 2,
            "name": "Tech Docs & Notes",
            "item": "{{ site.url }}/docs/"
        },
        {
            "@type": "ListItem",
            "position": 3,
            "name": {{ page.title | jsonify }},
            "item": "{{ site.url }}{{ page.url }}"
        }
    ]
}
</script>
